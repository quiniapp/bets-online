name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint and Type Check
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build helper package
        run: pnpm --filter helper build

      - name: Lint API
        run: pnpm --filter api lint

      - name: Type check API
        run: pnpm --filter api type-check

      - name: Lint Web
        run: pnpm --filter web lint

      - name: Type check Web
        run: pnpm --filter web type-check

  # Job 2: Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          # Dummy env vars for build (not used in production)
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          JWT_SECRET: test-secret-min-32-characters-long-for-build
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-for-build
          SESSION_SECRET: test-session-secret-min-32-chars-for-build
          ALLOWED_ORIGINS: http://localhost:3000
          API_URL: http://localhost:3001

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            api/dist
            web/.next
          retention-days: 1

  # Job 3: Tests (API)
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build helper package
        run: pnpm --filter helper build

      - name: Run API tests
        run: pnpm --filter api test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          JWT_SECRET: test-secret-min-32-characters-long-for-tests
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-for-tests
          SESSION_SECRET: test-session-secret-min-32-chars-for-tests
          ALLOWED_ORIGINS: http://localhost:3000
          API_URL: http://localhost:3001

  # Job 4: Tests (Web)
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build helper package
        run: pnpm --filter helper build

      - name: Run Web tests
        run: pnpm --filter web test || echo "No tests configured yet"

  # Job 5: Summary
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, build, test-api, test-web]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint-and-type-check.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test-api.result }}" != "success" ] || \
             [ "${{ needs.test-web.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed! ✅"
