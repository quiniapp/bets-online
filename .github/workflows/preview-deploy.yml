name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          # These will be replaced with actual preview environment variables
          DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.PREVIEW_ALLOWED_ORIGINS }}
          API_URL: ${{ secrets.PREVIEW_API_URL }}

      # Example: Deploy to Vercel (Frontend)
      # Uncomment and configure when you set up Vercel
      # - name: Deploy Frontend to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     scope: ${{ secrets.VERCEL_ORG_ID }}
      #     alias-domains: |
      #       pr-${{ github.event.pull_request.number }}-bets-online.vercel.app

      # Example: Deploy to Railway/Render (Backend)
      # Uncomment and configure when you set up your backend hosting
      # - name: Deploy Backend to Railway
      #   run: |
      #     # Install Railway CLI and deploy
      #     npm install -g @railway/cli
      #     railway link ${{ secrets.RAILWAY_PROJECT_ID }}
      #     railway up --service api --environment pr-${{ github.event.pull_request.number }}

      - name: Comment Preview URLs on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            // These URLs will be generated by your actual deployment service
            const frontendUrl = `https://pr-${prNumber}-bets-online.vercel.app`;
            const backendUrl = `https://pr-${prNumber}-api-bets-online.railway.app`;
            const docsUrl = `${backendUrl}/doc`;

            const comment = `## 🚀 Preview Deployment Ready!

            Your preview environment has been deployed successfully.

            ### 📱 Frontend Preview
            🔗 **URL**: [${frontendUrl}](${frontendUrl})

            ### ⚙️ Backend API Preview
            🔗 **API**: [${backendUrl}](${backendUrl})
            📚 **Docs**: [${docsUrl}](${docsUrl})

            ### 🔍 Preview Details
            - **PR**: #${prNumber}
            - **Commit**: ${context.sha.substring(0, 7)}
            - **Branch**: \`${context.payload.pull_request.head.ref}\`

            ---

            ⚠️ **Note**: This is a preview environment. Data may be reset periodically.

            <sub>Preview deployments are automatically updated on each commit.</sub>
            `;

            // Find existing preview comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Deployment Ready')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

  cleanup-preview:
    name: Cleanup Preview on PR Close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Comment cleanup message
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🧹 Preview Environment Cleaned Up

              The preview deployment for this PR has been removed.

              Thank you for your contribution! 🎉`
            });

      # Add cleanup steps for your deployment service
      # Example for Vercel:
      # - name: Remove Vercel deployment
      #   run: |
      #     vercel remove pr-${{ github.event.pull_request.number }}-bets-online --yes
