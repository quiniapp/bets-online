name: PR Build Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  deploy-preview:
    name: Validate Build for PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm --filter helper build && pnpm --filter api build && pnpm --filter web build
        env:
          # Dummy env vars for build validation (not used in production)
          # Vercel and Railway handle actual deployments automatically
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/preview
          JWT_SECRET: preview-secret-min-32-characters-long-for-build-validation
          JWT_REFRESH_SECRET: preview-refresh-secret-min-32-chars-for-validation
          SESSION_SECRET: preview-session-secret-min-32-chars-for-validation
          ALLOWED_ORIGINS: http://localhost:3000
          API_URL: http://localhost:3001

      # Example: Deploy to Vercel (Frontend)
      # Uncomment and configure when you set up Vercel
      # - name: Deploy Frontend to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     scope: ${{ secrets.VERCEL_ORG_ID }}
      #     alias-domains: |
      #       pr-${{ github.event.pull_request.number }}-bets-online.vercel.app

      # Example: Deploy to Railway/Render (Backend)
      # Uncomment and configure when you set up your backend hosting
      # - name: Deploy Backend to Railway
      #   run: |
      #     # Install Railway CLI and deploy
      #     npm install -g @railway/cli
      #     railway link ${{ secrets.RAILWAY_PROJECT_ID }}
      #     railway up --service api --environment pr-${{ github.event.pull_request.number }}

      - name: Comment Preview URLs on PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const branch = context.payload.pull_request.head.ref;

            // Vercel generates preview URLs automatically
            // You can find the actual URL in Vercel's GitHub integration comments
            const frontendUrl = `https://dev-arena-bett-git-${branch.replace(/[^a-z0-9]/gi, '-').toLowerCase()}-quiniapps-projects.vercel.app`;

            // Railway generates PR deployments if enabled in settings
            // Format: pr-{number}-{service}.up.railway.app
            const backendUrl = `https://bets-online-api-production-XXXX.up.railway.app`;
            const docsUrl = `${backendUrl}/doc`;

            const comment = `## ✅ Build Validation Passed!

            All packages compiled successfully for this PR.

            ### 📦 Build Status
            - ✅ **Helper**: Compiled
            - ✅ **API**: Compiled
            - ✅ **Web**: Compiled

            ### 🚀 Preview Deployments

            **Frontend (Vercel)**
            - Check the Vercel bot comment below for the exact preview URL
            - Or visit: [Vercel Dashboard](https://vercel.com/quiniapps-projects/dev-arena-bett)

            **Backend (Railway)**
            ${backendUrl.includes('XXXX') ?
              '- ⚠️ PR deployments not yet configured in Railway\n- Enable in: Railway Settings → Environment → PR Deployments' :
              `- 🔗 API: ${backendUrl}\n- 📚 Docs: ${docsUrl}`
            }

            ### 🔍 PR Details
            - **PR**: #${prNumber}
            - **Commit**: ${context.sha.substring(0, 7)}
            - **Branch**: \`${branch}\`

            ---

            <details>
            <summary>📖 How to enable Railway PR Deployments</summary>

            1. Go to Railway project → API service
            2. Settings → Environment
            3. Enable "Create deployments for pull requests"
            4. Each PR will get its own temporary API deployment
            </details>

            <sub>Build validation runs on each commit • Preview URLs update automatically</sub>
            `;

            // Find existing preview comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Build Validation')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

  cleanup-preview:
    name: Cleanup Preview on PR Close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Comment cleanup message
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🧹 Preview Environment Cleaned Up

              The preview deployment for this PR has been removed.

              Thank you for your contribution! 🎉`
            });

      # Add cleanup steps for your deployment service
      # Example for Vercel:
      # - name: Remove Vercel deployment
      #   run: |
      #     vercel remove pr-${{ github.event.pull_request.number }}-bets-online --yes
